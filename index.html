<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-width=1.0">
    <title>힙한 카드뉴스 메이커</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
</head>

<body>
    <header class="app-header">
        <h1>✨ 힙한 카드뉴스 메이커</h1>
        <p>인스타그램용 커버 배경과 그라데이션, 다크 테마를 기본 지원합니다.</p>
    </header>

    <main class="app-container">
        <section class="editor-section">
            <div class="control-group">
                <h3>1. 표지 (첫 장) 설정</h3>
                <label>메인 제목</label>
                <textarea id="cover-title" placeholder="큰 글씨 제목" rows="2">큰 글씨 제목</textarea>

                <label>서브 타이틀 (선택)</label>
                <textarea id="cover-subtitle" placeholder="작은 글씨 부제목" rows="1">: 부제</textarea>

                <label>배경 썸네일 (선택)</label>
                <input type="file" id="cover-bg-upload" accept="image/*">

                <label>배경 투명도 (<span id="opacity-val">75</span>%)</label>
                <input type="range" id="cover-bg-opacity" min="0" max="1" step="0.05" value="0.75">

                <div class="flex-row" style="margin-top: 15px;">
                    <input type="checkbox" id="cover-grad-enable" checked style="width:auto; cursor:pointer;">
                    <label for="cover-grad-enable" style="margin:0; cursor:pointer;">그라데이션 (가독성 향상)</label>
                </div>
                <div class="flex-row" style="margin-top: 5px;">
                    <input type="color" id="cover-grad-color" value="#000000" style="width: 50px;">
                    <select id="cover-grad-dir" style="flex: 1;">
                        <option value="to top" selected>아래에서 위로 (텍스트 아래 배치)</option>
                        <option value="to bottom">위에서 아래로 (텍스트 위 배치)</option>
                        <option value="to right">왼쪽에서 오른쪽으로</option>
                        <option value="circle">가운데 원형 중심</option>
                    </select>
                </div>

                <label>텍스트 정렬 위치</label>
                <select id="cover-text-align">
                    <option value="flex-end-left" selected>좌측 하단 (힙한 예시 스타일)</option>
                    <option value="center-center">정중앙</option>
                    <option value="flex-start-left">좌측 상단</option>
                </select>
            </div>

            <div class="control-group">
                <h3>2. 본문 내용 (가변 장수)</h3>
                <p class="help-text">엔터키를 두 번 입력(빈 줄)하거나 '---'를 쓰면 다음 페이지로 나뉩니다.</p>
                <textarea id="body-content" placeholder="내용을 입력하세요..." rows="8">첫 번째 장에 들어갈 내용입니다. 핵심 메시지를 적어보세요.

두 번째 장에 들어갈 내용입니다. 엔터를 두번 치면 페이지가 자동으로 나뉩니다.

세 번째 장에 들어갈 내용입니다. 내용이 길어질수록 카드 분량이 동적으로 끝없이 늘어납니다.</textarea>
            </div>

            <div class="control-group">
                <h3>3. 아웃트로 (마지막 장) 설정</h3>
                <p class="help-text">마지막 장은 텍스트가 <strong>"소소한 보험상식 가져가세요"</strong>로 고정되며,<br>가운데 정렬로 배치됩니다. (표지 배경 스타일이 자동 적용됩니다)</p>
            </div>

            <div class="control-group">
                <h3>4. 전체 색상</h3>
                <div class="color-pickers">
                    <div>
                        <label>카드 배경</label>
                        <input type="color" id="bg-color" value="#111111">
                    </div>
                    <div>
                        <label>본문 글자</label>
                        <input type="color" id="text-color" value="#ffffff">
                    </div>
                    <div>
                        <label>표지 텍스트</label>
                        <input type="color" id="primary-color" value="#ffffff">
                    </div>
                </div>
            </div>

            <div class="actions">
                <button id="btn-download-all" class="btn primary">전체 일괄 다운로드</button>
            </div>
        </section>

        <section class="preview-section" id="preview-section">
            <h3 class="preview-title">미리보기 (1350 × 1350)</h3>
            <div id="cards-container" class="cards-container">
            </div>
        </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
